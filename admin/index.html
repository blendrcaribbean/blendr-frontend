<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Blendr</title>
  <link rel="icon" href="../assets/wp-images/cropped-Blendr-Favicon-02-32x32.png" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #101F21; --teal: #3D6F74; --orange: #FFBC7D;
      --pale: #E9FAFF; --white: #fff; --text: #333;
    }
    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-card {
      background: var(--white);
      border-radius: 8px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo img {
      height: 48px;
      width: auto;
    }
    .login-title {
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
      font-weight: 700;
      margin-bottom: 2rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }
    .form-group label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--dark);
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-family: inherit;
      background: var(--pale);
      border: 1.5px solid transparent;
      border-radius: 4px;
      outline: none;
      color: var(--text);
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--teal); background: #fff; }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn-login:hover { background: var(--teal); }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--teal);
      text-decoration: underline;
    }
    .back-link:hover { color: var(--dark); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="../assets/wp-images/Blendr-New-COncept-Logo-02-01.png" alt="Blendr" style="filter:invert(0)" />
    </div>
    <p class="login-title">Admin Panel</p>

    <div class="error-msg" id="error-msg">
      <i class="fas fa-exclamation-circle"></i> Invalid username or password.
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username" placeholder="admin" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn-login" id="login-btn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <a href="../index.html" class="back-link">← Back to website</a>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('blendr_admin_token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errMsg = document.getElementById('error-msg');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      btn.textContent = 'Signing in…';
      btn.disabled = true;
      errMsg.style.display = 'none';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('blendr_admin_token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          errMsg.style.display = 'block';
          errMsg.textContent = data.error || 'Invalid username or password.';
        }
      } catch {
        errMsg.style.display = 'block';
        errMsg.textContent = 'Connection error. Is the server running?';
      }

      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      btn.disabled = false;
    });
  </script>
</body>
</html>
